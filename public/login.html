<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | ProjectFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <a href="index.html" class="auth-back">← Back to home</a>
      <h1>ProjectFlow</h1>
      <p class="auth-subtitle">A cleaner workspace for projects, tasks, and team momentum.</p>
      <div class="auth-tabs">
        <button class="tab active" data-tab="login">Login</button>
        <button class="tab" data-tab="signup">Sign Up</button>
      </div>

      <form id="login-form" class="auth-form active">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <div class="form-error" id="login-error"></div>
        <button type="submit" class="btn-primary">Continue to workspace</button>
      </form>

      <form id="signup-form" class="auth-form">
        <div class="form-group">
          <label for="signup-name">Name</label>
          <input type="text" id="signup-name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" required minlength="6" placeholder="At least 6 characters">
        </div>
        <div class="form-error" id="signup-error"></div>
        <button type="submit" class="btn-primary">Create workspace</button>
      </form>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
