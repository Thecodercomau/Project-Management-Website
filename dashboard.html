<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Project Manager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Projects</h2>
        <button class="btn btn-sm btn-primary" id="create-project-btn">+ New</button>
      </div>
      <div class="sidebar-content">
        <ul id="project-list" class="project-list"></ul>
      </div>
      <div class="sidebar-footer">
        <a href="admin.html" class="btn btn-secondary" style="display:none;width:100%;margin-bottom:0.5rem;" id="admin-link">⚙ Admin Panel</a>
        <button class="btn btn-secondary" style="width:100%;" id="logout-btn">Logout</button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-area">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-left">
          <h1 id="project-title">Select a project</h1>
        </div>
        <div class="topbar-right">
          <span class="user-email" id="user-email"></span>
          <div style="position:relative;">
            <button class="notification-btn" id="notif-btn">
              🔔
              <span id="notif-count" class="notif-count hidden">0</span>
            </button>
            <div id="notif-dropdown" class="notif-dropdown">
              <div class="notif-dropdown-header">
                <span>Notifications</span>
                <button class="btn btn-sm btn-secondary" id="mark-all-read">Mark all read</button>
              </div>
              <div id="notif-list"></div>
            </div>
          </div>
        </div>
      </header>

      <!-- Kanban -->
      <div id="kanban-container" class="kanban-container">
        <div class="empty-state" style="padding-top:4rem;width:100%;text-align:center;">
          <p>Select a project to view the board</p>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div id="right-panel" class="right-panel">
      <div class="panel-header">
        <h3>Task Details</h3>
        <button class="btn-icon" id="close-panel">✕</button>
      </div>
      <div id="panel-body" class="panel-body"></div>
    </div>
  </div>

  <!-- Create Project Modal -->
  <div id="project-modal" class="modal-overlay">
    <div class="modal">
      <h2>Create Project</h2>
      <div class="form-group">
        <label for="project-name">Project name</label>
        <input type="text" id="project-name" placeholder="My Project" required>
      </div>
      <div class="form-group">
        <label for="project-desc">Description (optional)</label>
        <textarea id="project-desc" placeholder="What is this project about?"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-create">Create</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js';
    import { requireAuth, getUser } from './js/auth/protect.js';
    import { logout } from './js/auth/logout.js';
    import { loadProjects, createProject, renderProjects, setCurrentProjectId, getCurrentProjectId } from './js/app/projects.js';
    import { renderKanban, closeTaskDetail } from './js/app/kanban.js';
    import { loadNotifications, toggleNotifications, markAllRead } from './js/app/notifications.js';
    import { subscribeToRealtime, unsubscribeAll } from './js/app/realtime.js';
    import { checkAdmin } from './js/app/admin.js';

    let currentUser = null;

    async function init() {
      const session = await requireAuth();
      if (!session) return;

      const user = await getUser();
      if (!user) return;
      currentUser = user;

      document.getElementById('user-email').textContent = user.email;

      const isAdmin = await checkAdmin();
      if (isAdmin) {
        document.getElementById('admin-link').style.display = 'block';
      }

      window.appEvents = {
        onProjectChange: async (projectId) => {
          document.getElementById('project-title').textContent =
            document.querySelector(`.project-item[data-id="${projectId}"] .project-name`)?.textContent || 'Project';
          closeTaskDetail();
          await renderKanban();
        }
      };

      const projects = await loadProjects();
      renderProjects(projects);

      if (projects.length > 0) {
        setCurrentProjectId(projects[0].id);
        document.querySelector('.project-item')?.classList.add('active');
        document.getElementById('project-title').textContent = projects[0].name;
        await renderKanban();
      }

      await loadNotifications();
      subscribeToRealtime();

      // Create project modal
      const modal = document.getElementById('project-modal');
      document.getElementById('create-project-btn').addEventListener('click', () => {
        document.getElementById('project-name').value = '';
        document.getElementById('project-desc').value = '';
        modal.classList.add('open');
      });
      document.getElementById('modal-cancel').addEventListener('click', () => {
        modal.classList.remove('open');
      });
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('open');
      });
      document.getElementById('modal-create').addEventListener('click', async () => {
        const name = document.getElementById('project-name').value.trim();
        if (!name) return;
        const desc = document.getElementById('project-desc').value.trim();
        const project = await createProject(name, desc);
        if (project) {
          modal.classList.remove('open');
          const projects = await loadProjects();
          renderProjects(projects);
          setCurrentProjectId(project.id);
          document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));
          const activeItem = document.querySelector(`.project-item[data-id="${project.id}"]`);
          if (activeItem) activeItem.classList.add('active');
          document.getElementById('project-title').textContent = project.name;
          await renderKanban();
        }
      });

      // Close panel
      document.getElementById('close-panel').addEventListener('click', closeTaskDetail);

      // Notifications toggle
      document.getElementById('notif-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleNotifications();
      });
      document.addEventListener('click', (e) => {
        const dd = document.getElementById('notif-dropdown');
        if (dd.classList.contains('open') && !dd.contains(e.target) && e.target !== document.getElementById('notif-btn')) {
          dd.classList.remove('open');
        }
      });

      // Mark all read
      document.getElementById('mark-all-read').addEventListener('click', markAllRead);

      // Logout
      document.getElementById('logout-btn').addEventListener('click', () => {
        unsubscribeAll();
        logout();
      });

      // Custom notification toast
      document.addEventListener('app-notification', async (e) => {
        await loadNotifications();
      });

      // Re-load task detail on realtime comment update
      document.addEventListener('reload-task-detail', async () => {
        const { getCurrentTaskId, openTaskDetail } = await import('./js/app/kanban.js');
        const taskId = getCurrentTaskId();
        if (taskId) {
          await openTaskDetail(taskId);
        }
      });
    }

    init();
  </script>
</body>
</html>
