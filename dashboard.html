<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Project Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">ProjectFlow</div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="btn-outline" id="logout-btn">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div class="dashboard-header">
      <h2 data-subtitle="Plan, ship, and track every project in one focused workspace.">My Projects</h2>
      <button class="btn-primary" id="new-project-btn">+ New Project</button>
    </div>

    <div class="loading" id="loading-projects">Loading projects...</div>
    <div class="projects-grid" id="projects-grid"></div>
    <div class="empty-state" id="empty-state">
      <p>No projects yet. Create your first project!</p>
    </div>
  </main>

  <div class="modal-overlay" id="project-modal">
    <div class="modal">
      <h3 id="project-modal-title">New Project</h3>
      <form id="project-form">
        <div class="form-group">
          <label for="project-name">Project Name</label>
          <input type="text" id="project-name" required>
        </div>
        <div class="form-group">
          <label for="project-desc">Description</label>
          <textarea id="project-desc" rows="3"></textarea>
        </div>
        <div class="form-error" id="project-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn-outline" id="project-cancel">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
