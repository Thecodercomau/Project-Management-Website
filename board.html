<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board - Project Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <a href="dashboard.html" class="nav-back">← Back</a>
      <div class="nav-brand" id="board-project-name">Project</div>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user"></span>
      <button class="btn-outline" id="logout-btn">Logout</button>
    </div>
  </nav>

  <main class="container board-container">
    <div class="board-header">
      <div class="board-actions">
        <button class="btn-primary" id="add-task-btn">+ Add Task</button>
      </div>
    </div>

    <div class="loading" id="loading-board">Loading board...</div>
    <div class="board" id="board">
      <div class="column" data-status="todo">
        <div class="column-header">
          <h3>To Do</h3>
          <span class="count" id="count-todo">0</span>
        </div>
        <div class="task-list" id="list-todo"></div>
      </div>
      <div class="column" data-status="in-progress">
        <div class="column-header">
          <h3>In Progress</h3>
          <span class="count" id="count-in-progress">0</span>
        </div>
        <div class="task-list" id="list-in-progress"></div>
      </div>
      <div class="column" data-status="done">
        <div class="column-header">
          <h3>Done</h3>
          <span class="count" id="count-done">0</span>
        </div>
        <div class="task-list" id="list-done"></div>
      </div>
    </div>
  </main>

  <div class="modal-overlay" id="task-modal">
    <div class="modal modal-wide">
      <h3 id="task-modal-title">New Task</h3>
      <form id="task-form">
        <input type="hidden" id="task-id">
        <div class="form-row">
          <div class="form-group">
            <label for="task-title">Title</label>
            <input type="text" id="task-title" required>
          </div>
          <div class="form-group">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="task-desc">Description</label>
          <textarea id="task-desc" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="task-due">Due Date</label>
            <input type="date" id="task-due">
          </div>
          <div class="form-group">
            <label for="task-assignee">Assign to (user email)</label>
            <input type="text" id="task-assignee" placeholder="user@example.com">
          </div>
        </div>
        <div class="form-error" id="task-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn-outline" id="task-cancel">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="view-modal">
    <div class="modal modal-wide">
      <div class="modal-header-row">
        <h3 id="view-title"></h3>
        <div class="modal-header-actions">
          <button class="btn-small btn-outline" id="edit-task-btn">Edit</button>
          <button class="btn-small btn-danger" id="delete-task-btn">Delete</button>
          <button class="btn-small btn-outline" id="view-close">×</button>
        </div>
      </div>
      <div class="task-detail">
        <div class="detail-row">
          <span class="detail-label">Status</span>
          <span class="detail-badge" id="view-status"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Priority</span>
          <span class="detail-badge" id="view-priority"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Due Date</span>
          <span id="view-due"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Assigned To</span>
          <span id="view-assignee"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Description</span>
          <p id="view-desc"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="auth.js"></script>
  <script src="board.js"></script>
</body>
</html>
